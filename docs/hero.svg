<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <radialGradient id="bg" cx="72%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#0b1830"/><stop offset="60%" stop-color="#04070d"/><stop offset="100%" stop-color="#04070d"/>
    </radialGradient>
    <radialGradient id="orb" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#eafcff"/><stop offset="46%" stop-color="#21d4fd"/><stop offset="100%" stop-color="#05283c"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>
  <!-- faint grid -->
  <g stroke="#5a96d2" stroke-opacity="0.06">
    <path d="M0 40H1200M0 80H1200M0 120H1200M0 160H1200M0 200H1200M0 240H1200M0 280H1200"/>
    <path d="M40 0V340M80 0V340M120 0V340M160 0V340M200 0V340M240 0V340M280 0V340M320 0V340M360 0V340M400 0V340M440 0V340M480 0V340M520 0V340M560 0V340M600 0V340M640 0V340M680 0V340M720 0V340M760 0V340M800 0V340"/>
  </g>

  <!-- corner brackets -->
  <g stroke="#21d4fd" stroke-opacity="0.5" stroke-width="2" fill="none">
    <path d="M28 28h34M28 28v34"/><path d="M1172 28h-34M1172 28v34"/>
    <path d="M28 312h34M28 312v-34"/><path d="M1172 312h-34M1172 312v-34"/>
  </g>

  <!-- title -->
  <text x="70" y="150" fill="#8fe9ff" font-size="72" font-weight="800" letter-spacing="18">A·X·O·N</text>
  <text x="74" y="188" fill="#5f7fa6" font-size="17" letter-spacing="9">SECOND BRAIN SYSTEM</text>
  <text x="74" y="236" fill="#cfe4ff" font-size="19">Your PC's AI assistant — talks, controls apps &amp; files,</text>
  <text x="74" y="262" fill="#cfe4ff" font-size="19">and maps everything you own as a living graph.</text>
  <g font-size="12" letter-spacing="2" fill="#7fd7ff">
    <rect x="74" y="284" width="150" height="26" rx="13" fill="none" stroke="#21d4fd" stroke-opacity="0.5"/>
    <text x="149" y="301" text-anchor="middle">POWERED BY CLAUDE</text>
    <rect x="234" y="284" width="120" height="26" rx="13" fill="none" stroke="#21d4fd" stroke-opacity="0.5"/>
    <text x="294" y="301" text-anchor="middle">476K FILES</text>
  </g>

  <!-- reactor + graph motif (right) -->
  <g transform="translate(960,170)">
    <circle r="118" fill="none" stroke="#21d4fd" stroke-opacity="0.5" stroke-width="6" stroke-dasharray="2 9"/>
    <circle r="96" fill="none" stroke="#21d4fd" stroke-opacity="0.3" stroke-width="3" stroke-dasharray="1 11"/>
    <circle r="60" fill="none" stroke="#21d4fd" stroke-opacity="0.35"/>
    <circle r="34" fill="url(#orb)" filter="url(#glow)"/>
    <!-- orbiting nodes -->
    <g>
      <line x1="0" y1="0" x2="-150" y2="-70" stroke="#5a96d2" stroke-opacity="0.25"/>
      <line x1="0" y1="0" x2="150" y2="-60" stroke="#5a96d2" stroke-opacity="0.25"/>
      <line x1="0" y1="0" x2="-140" y2="80" stroke="#5a96d2" stroke-opacity="0.25"/>
      <line x1="0" y1="0" x2="150" y2="90" stroke="#5a96d2" stroke-opacity="0.25"/>
      <circle cx="-150" cy="-70" r="9" fill="#ffb020"/>
      <circle cx="150" cy="-60" r="8" fill="#b06cff"/>
      <circle cx="-140" cy="80" r="7" fill="#2bd576"/>
      <circle cx="150" cy="90" r="9" fill="#ef4444"/>
      <circle cx="-190" cy="10" r="5" fill="#22d3ee"/>
      <circle cx="190" cy="20" r="5" fill="#f59e0b"/>
    </g>
  </g>
</svg>
